<!DOCTYPE html>
<html>
    <body>
        <p>i think  India win the samifinal</p>
        <p>this extra p is time wasting</p>
        <p id="details"></p>
        <script>
            class car {
                constructor(brand){
                    this.carname=brand;
                }
                present(){
                    return 'I have a'+ this.carname;
                }
            }
            class Model extends car{
                constructor(brand,mod){
                    super(brand);
                    this.model=mod;
                }
                show(){
                    return this.present()+ ',it is a' + this.model;
               }
            }
            let mycar = new Model("ford","mustang");
            document.getElementById("details").innerHTML = mycar.show();
            </script>
    </body>
</html>
